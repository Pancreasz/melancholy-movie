version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: melancholy_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wp_database     # Name of the database
      MYSQL_USER: wp_user             # The user WP will log in as
      MYSQL_PASSWORD: postgres  # The password
      MYSQL_ROOT_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:fpm-alpine
    container_name: melancholy_wp
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wp_database    # Matches MYSQL_DATABASE
      WORDPRESS_DB_USER: wp_user        # Matches MYSQL_USER
      WORDPRESS_DB_PASSWORD: postgres # Matches MYSQL_PASSWORD
      WORDPRESS_CONFIG_EXTRA: |
          define('WP_ENVIRONMENT_TYPE', 'local');
    volumes:
      - wp_data:/var/www/html

  nginx:
    image: nginx:alpine
    container_name: melancholy_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - wordpress
    volumes:
      - wp_data:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  db_data:
  wp_data: